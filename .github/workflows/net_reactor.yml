name: Protect DLL with .NET Reactor (Windows)

on:
  workflow_dispatch: # Chạy thủ công
  push:
  
jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    steps:
      # - name: Checkout code
      #   uses: actions/checkout@v4

      - name: Download file zip
        run: |
          curl -L "https://github.com/SychicBoy/NETReactorSlayer/releases/download/v6.4.0.0/NETReactorSlayer.CLI-net6.0-linux64.zip" -o mydata.zip
          # -L để follow redirect nếu có, -o để đặt tên file đầu ra

      - name: Giải nén file
        run: |
          mkdir -p ./output-folder
          unzip mydata.zip -d ./output-folder
          cd ./output-folder
          ls NETReactorSlayer.CLI
          # chmod +x *
          # ./output-folder/NETReactorSlayer.CLI -h
          # -d chỉ định thư mục đích để giải nén
